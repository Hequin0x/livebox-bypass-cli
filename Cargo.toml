[package]
name = "livebox-bypass-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
clap = { version = "4.5", features = ["derive"] }
dialoguer = "0.11"
hex = "0.4"
md5 = "0.7"
owo-colors = "4"
rand = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["blocking", "json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
url = "2.5"

[dev-dependencies]
mockito = "1"
